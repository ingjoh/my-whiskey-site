name: CI/CD Build & Verification

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  verify:
    name: Lint & Typecheck Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Compile Check
        run: npx tsc --noEmit

      - name: Generate Codebase Dependency Graph
        run: npm run generate-graph

      # Authenticate with Google Cloud using a Service Account Key stored in GitHub Secrets
      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Upload generated graph artifacts to the secure GCS bucket
      - name: Upload Graph Artifacts to Google Cloud Storage
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: |
            graph.json
            graph.html
            GRAPH_REPORT.md
          destination: mywhiskey-code-graph
          parent: false

